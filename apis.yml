aid: programmableweb
name: ProgrammableWeb
description: >-
  ProgrammableWeb was the original API directory and developer resource,
  founded by John Musser in 2005, documenting over 19,000 open web APIs and
  thousands of mashups and applications over 17 years of operation. It was
  acquired by Alcatel-Lucent in 2010, sold to MuleSoft in 2013, and ultimately
  shut down in October 2022 following Salesforce's acquisition of MuleSoft.
  The site's content is preserved through the Internet Archive's Wayback Machine.
